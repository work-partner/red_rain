name: Build Red Rain (Windows)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native module build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev libsecret-1-dev libx11-dev libxkbfile-dev build-essential python3
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run compile
      - uses: actions/upload-artifact@v4
        with:
          name: compiled-build
          path: |
            out-build/**
            out-vscode/**
            .build/**
          include-hidden-files: true

  package-windows:
    needs: compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v4
        with:
          name: compiled-build
      - name: Locate Visual Studio installation
        shell: pwsh
        run: |
          $installerPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $installerPath -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            Write-Error "vswhere did not find a Visual Studio install with the C++ toolset."
            exit 1
          }
          Write-Host "Found Visual Studio at: $vsPath"
          if ($vsPath -match "2019") {
            echo "vs2019_install=$vsPath" >> $env:GITHUB_ENV
          } else {
            echo "vs2022_install=$vsPath" >> $env:GITHUB_ENV
          }
      - run: npm ci
      - name: Build Windows package
        run: npm run gulp vscode-win32-x64-min
      - name: Zip result (fallback if no installer script runs)
        run: Compress-Archive -Path ..\VSCode-win32-x64\* -DestinationPath RedRain-win32-x64.zip
        shell: pwsh
      - name: Install bundled Red Rain Toolkit extension into the package
        run: |
          .\..\VSCode-win32-x64\bin\code.cmd --install-extension red-rain-toolkit.vsix || echo "install step skipped, install manually on first run"
        shell: pwsh
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: RedRain-Windows
          path: RedRain-win32-x64.zip
