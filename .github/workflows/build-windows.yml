name: Build Red Rain (Windows)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run compile
      - uses: actions/upload-artifact@v7
        with:
          name: compiled-build
          path: |
            out-build/**
            out-vscode/**
            .build/**
          include-hidden-files: true

  package-windows:
    needs: compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v4
        with:
          name: compiled-build
      - run: npm ci
      - name: Build Windows package
        run: npm run gulp vscode-win32-x64-min
      - name: Zip result (fallback if no installer script runs)
        run: Compress-Archive -Path ..\VSCode-win32-x64\* -DestinationPath RedRain-win32-x64.zip
        shell: pwsh
      - name: Install bundled Red Rain Toolkit extension into the package
        run: |
          .\..\VSCode-win32-x64\bin\code.cmd --install-extension red-rain-toolkit.vsix || echo "install step skipped, install manually on first run"
        shell: pwsh
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        with:
          name: RedRain-Windows
          path: RedRain-win32-x64.zip
