name: Build Red Rain (Windows)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native module build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev libsecret-1-dev libx11-dev libxkbfile-dev build-essential python3
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
      - run: npm ci
      - run: npm run compile
      - uses: actions/upload-artifact@v4
        with:
          name: compiled-build
          path: |
            out-build/**
            out-vscode/**
            .build/**
          include-hidden-files: true

  package-windows:
    needs: compile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch product.json (missing win32ContextMenu)
        shell: pwsh
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('product.json', 'utf8'));
            if (!p.win32ContextMenu) {
              p.win32ContextMenu = {
                x64: { clsid: '{d17f1cca-3bfa-489f-9736-4a55e8f61a5e}' },
                arm64: { clsid: '{1f75b4a1-3b8b-4b1c-9c3f-8f5b8b0d6c9e}' },
                ia32: { clsid: '{a5c1d6d6-52a4-4e0d-9e5e-8a9dc6b16f7d}' }
              };
              fs.writeFileSync('product.json', JSON.stringify(p, null, '\t'));
              console.log('Patched product.json with win32ContextMenu.');
            } else {
              console.log('win32ContextMenu already present, no patch needed.');
            }
          "
      - uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
      - uses: actions/download-artifact@v4
        with:
          name: compiled-build
      - name: Locate Visual Studio installation
        shell: pwsh
        run: |
          $installerPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $installerPath -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            Write-Error "vswhere did not find a Visual Studio install with the C++ toolset."
            exit 1
          }
          Write-Host "Found Visual Studio at: $vsPath"
          if ($vsPath -match "2019") {
            echo "vs2019_install=$vsPath" >> $env:GITHUB_ENV
          } else {
            echo "vs2022_install=$vsPath" >> $env:GITHUB_ENV
          }
      - run: npm ci
      - name: Build Windows package
        run: npm run gulp vscode-win32-x64
      - name: Zip result
        run: Compress-Archive -Path ..\VSCode-win32-x64\* -DestinationPath RedRain-win32-x64.zip
        shell: pwsh
      - name: Install bundled Red Rain Toolkit extension into the package
        run: |
          .\..\VSCode-win32-x64\bin\code.cmd --install-extension red-rain-toolkit.vsix || echo "install step skipped, install manually on first run"
        shell: pwsh
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: RedRain-Windows
          path: RedRain-win32-x64.zip
